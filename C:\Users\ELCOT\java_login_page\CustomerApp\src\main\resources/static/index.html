<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Form</title>
<style>
  body { font-family: Arial, sans-serif; background: #4a29df; padding: 30px; }
  form { background: #88c6df; max-width: 420px; margin: auto; padding: 24px; border-radius: 8px; box-shadow: 0 0 8px rgba(206, 179, 179, 0.1); }
  h2 { text-align: center; color: #132452; }
  label { display: block; margin-top: 14px; font-weight: bold; color: 
  #ec0f0f; }
  input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
  button { margin-top: 20px; width: 100%; padding: 10px; background: #2c5f5b; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
  button:hover { background: #1e4340; }
</style>
</head>
<body>
  <form method="POST" action="/submit">
    <h2>Customer Details</h2>

    <label>Full Name</label>
    <input type="text" name="fullName" required>

    <label>Phone</label>
    <input type="text" name="phone" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Address</label>
    <input type="text" name="address" required>

    <label>City</label>
    <input type="text" name="city" required>

  

    <button type="submit">Save Customer</button>
  </form>
</body>
</html>
